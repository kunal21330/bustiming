<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Stop Timings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f4f4;
        }
        .container {
            width: 90%;
            margin: auto;
        }
        h1 {
            margin-top: 20px;
        }
        /* 🔹 Bus buttons */
        .bus-buttons {
            margin-top: 20px;
        }
        .bus-buttons button {
            margin: 8px;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background-color: #2c3e50;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        .bus-buttons button:hover {
            background-color: #1abc9c;
        }
        .bus-section {
            display: none; /* hidden until selected */
            margin: 25px 0;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        h2 {
            background-color: #2c3e50;
            color: white;
            padding: 10px;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        #searchInput {
            display: none; /* shown only when a bus is selected */
            margin: 15px 0;
            padding: 10px;
            width: 60%;
            border:1px solid black;
        }
        #warning{
            color:red;
        }
        .footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #2c3e50;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bus Stop Timings</h1>
        <p id="warning">Timings effective from 01/04/2026</p>

        <!-- 🔹 Bus Buttons -->
        <div class="bus-buttons" id="busButtons">
            <button onclick="showBus('senior1')">HR39C 5612</button>
            <button onclick="showBus('senior2')">HR37E 2772</button>
            <button onclick="showBus('junior')">HR55X 9051</button>
        </div>

        <!-- 🔹 Search (only visible after selecting a bus) -->
        <input type="text" id="searchInput" placeholder="Search by stop or name..." onkeyup="filterTable()">

        <!-- 🔹 Bus Sections -->
        <div id="senior1" class="bus-section">
            <h2>HR39C 5612 (senior market)</h2>
            <table>
                <thead><tr><th>Bus Stop</th><th>Name</th><th>Time</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="senior2" class="bus-section">
            <h2>HR37E 2772 (senior outskirts)</h2>
            <table>
                <thead><tr><th>Bus Stop</th><th>Name</th><th>Time</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div id="junior" class="bus-section">
            <h2>HR55X9051 (junior)</h2>
            <table>
                <thead><tr><th>Bus Stop</th><th>Name</th><th>Time</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="footer">
        &copy; 2025 Bus Stop Timings. All rights reserved.
    </div>

    <script>
        const sheetId = "1FURmsXgeLq1J0hhTsn7VpQx6Y7K7omADCcEpP4SsMmo";
        const sheetName = "Sheet1";
        const apiKey = "AIzaSyBdEjBRnfEgszKKfMohT4NbnASeHhtkv_I";

        async function fetchBusData() {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${sheetName}?key=${apiKey}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                return parseSheetData(data.values);
            } catch (error) {
                console.error("Error fetching Google Sheet data:", error);
                return {};
            }
        }

        function parseSheetData(values) {
            if (!values || values.length === 0) return {};
            const busData = {};
            values.slice(1).forEach(row => {
                const [bus, stop, name, time] = row;
                if (!busData[bus]) busData[bus] = [];
                busData[bus].push({ stop, name, time });
            });
            return busData;
        }

        async function showBus(busId) {
            // hide all bus sections
            document.querySelectorAll(".bus-section").forEach(section => {
                section.style.display = "none";
            });

            const busData = await fetchBusData();
            if (!busData[busId]) return;

            const section = document.getElementById(busId);
            const tbody = section.querySelector("tbody");
            tbody.innerHTML = "";
            busData[busId].forEach(entry => {
                let row = `<tr><td>${entry.stop}</td><td>${entry.name}</td><td>${entry.time}</td></tr>`;
                tbody.innerHTML += row;
            });

            section.style.display = "block";
            document.getElementById("searchInput").style.display = "inline-block";
        }

        function filterTable() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const visibleSection = document.querySelector(".bus-section:not([style*='display: none'])");
            if (!visibleSection) return;
            const rows = visibleSection.querySelectorAll("tbody tr");

            rows.forEach(row => {
                let stop = row.cells[0].textContent.toLowerCase();
                let name = row.cells[1].textContent.toLowerCase();
                row.style.display = (stop.includes(input) || name.includes(input)) ? "" : "none";
            });
        }
    </script>
</body>
</html>
